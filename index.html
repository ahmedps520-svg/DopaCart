<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>DopaCart — Shopping, Minus the Shopping</title>
  <meta name="description" content="DopaCart is a 100% fictional shopping experience. No real money, no real products — just pure dopamine.">
  <meta name="theme-color" content="#000000">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DopaCart">

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body data-theme="crimson">

  <!-- ═══ Splash screen ═══ -->
  <div id="splash" class="splash" aria-hidden="true">
    <div class="splash-logo">
      <div class="splash-mark">
        <svg class="logo-glyph" viewBox="0 0 512 512" aria-hidden="true">
          <g transform="translate(18,-24)">
            <g fill="none" stroke="#fff" stroke-width="31" stroke-linecap="round" stroke-linejoin="round">
              <path d="M330 280L283 361L189 361L142 280L189 199L283 199Z"/>
              <path d="M283 199L350 152"/>
              <path d="M189 361L122 408"/>
            </g>
            <circle cx="350" cy="152" r="30" fill="#fff"/>
            <circle cx="122" cy="408" r="30" fill="#fff"/>
          </g>
        </svg>
      </div>
      <div class="splash-name">DopaCart</div>
      <div class="splash-tag">shopping, minus the shopping</div>
    </div>
  </div>

  <!-- ═══ App shell ═══ -->
  <div class="app">
    <main id="view" class="view" role="main"></main>

    <nav class="tabbar" role="navigation" aria-label="Main">
      <button class="tab" data-action="nav" data-route="home" aria-label="Home">
        <span class="tab-icon">🏠</span><span class="tab-label">Home</span>
      </button>
      <button class="tab" data-action="nav" data-route="browse" aria-label="Shop">
        <span class="tab-icon">🛍️</span><span class="tab-label">Shop</span>
      </button>
      <button class="tab tab-cart" data-action="nav" data-route="cart" aria-label="Cart">
        <span class="tab-icon">🛒</span><span class="tab-label">Cart</span>
        <span class="tab-badge" id="cart-badge" hidden>0</span>
      </button>
      <button class="tab" data-action="nav" data-route="orders" aria-label="Orders">
        <span class="tab-icon">📦</span><span class="tab-label">Orders</span>
        <span class="tab-badge tab-badge-dot" id="orders-dot" hidden></span>
      </button>
      <button class="tab" data-action="nav" data-route="rewards" aria-label="Rewards">
        <span class="tab-icon">🎁</span><span class="tab-label">Rewards</span>
        <span class="tab-badge tab-badge-dot" id="rewards-dot" hidden></span>
      </button>
    </nav>
  </div>

  <!-- ═══ Overlays ═══ -->
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>
  <canvas id="confetti-canvas" class="confetti-canvas" aria-hidden="true"></canvas>

  <!-- Portrait-only: shown when a phone is turned sideways (iOS ignores the
       manifest's orientation lock, so this is the reliable fallback). -->
  <div id="rotate-lock" aria-hidden="true">
    <div class="rl-emoji">📱</div>
    <div class="rl-title">Please rotate to portrait</div>
    <div class="rl-sub">DopaCart is a one-handed, upright kind of app.</div>
  </div>

  <!-- ═══ Scripts (classic scripts — works from file:// and GitHub Pages) ═══ -->
  <script src="./js/utils.js"></script>
  <script src="./js/sound.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/state.js"></script>
  <script src="./js/components.js"></script>
  <script src="./js/views/home.js"></script>
  <script src="./js/views/browse.js"></script>
  <script src="./js/views/product.js"></script>
  <script src="./js/views/cart.js"></script>
  <script src="./js/views/orders.js"></script>
  <script src="./js/views/rewards.js"></script>
  <script src="./js/views/settings.js"></script>
  <script src="./js/views/extras.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
